<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin – Portal Informasi FMIPA Untan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:      #2589e9;
      --blue-dark: #1a6cc9;
      --blue-soft: #eff6ff;
      --danger:    #ef4444;
      --border:    #e5e7eb;
      --text:      #111827;
      --muted:     #6b7280;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
      background: #f9fafb;

      /* Diagonal lines texture */
      background-image: repeating-linear-gradient(
        -45deg,
        transparent 0px, transparent 18px,
        rgba(0,0,0,0.025) 18px, rgba(0,0,0,0.025) 19px
      );
    }

    /* Soft blobs — no GPU blur needed */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,137,233,0.08) 0%, transparent 70%);
      top: -150px; right: -100px;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
      bottom: -120px; left: -80px;
    }

    /* Floating border circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid #e5e7eb;
      pointer-events: none;
      animation: floatC ease-in-out infinite;
    }
    .circle-1 { width:180px; height:180px; bottom:-60px; left:5%;   animation-duration:9s;  }
    .circle-2 { width:120px; height:120px; bottom:20px;  left:20%;  animation-duration:11s; animation-delay:2s; }
    .circle-3 { width:80px;  height:80px;  bottom:-20px; right:18%; animation-duration:8s;  animation-delay:1s; }
    .circle-4 { width:200px; height:200px; bottom:-80px; right:3%;  animation-duration:12s; animation-delay:3s; }

    @keyframes floatC {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 38px 38px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      animation: cardUp .4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardUp {
      from { opacity:0; transform:translateY(24px) scale(0.98); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 20px; right: 20px; height: 3px;
      background: linear-gradient(90deg, var(--blue), #60a5fa);
      border-radius: 0 0 4px 4px;
    }

    /* ── LOGO ── */
    .logo-row { display:flex; align-items:center; gap:12px; margin-bottom:30px; }

    .logo-box {
      width: 52px; height: 52px;
      background: var(--blue-soft);
      border: 1.5px solid #bfdbfe;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-box img { width:82%; height:82%; object-fit:contain; }

    .logo-txt .sup {
      font-size: 9.5px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--blue);
    }
    .logo-txt .main {
      font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.02em;
    }

    /* ── HEADING ── */
    h1 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 5px; letter-spacing: -0.02em; }
    .sub { font-size: 13.5px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

    /* ── FORM ── */
    .fg { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--text); margin-bottom: 7px; letter-spacing: 0.02em;
    }
    .iw { position: relative; }
    .iico {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%); font-size: 14px;
      color: var(--muted); pointer-events: none;
    }
    input[type=text], input[type=password] {
      width: 100%; padding: 11px 42px;
      border-radius: 10px; border: 1.5px solid var(--border);
      font-family: inherit; font-size: 14px; color: var(--text);
      background: #f9fafb; outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    input::placeholder { color: #d1d5db; }
    input:focus {
      border-color: var(--blue);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(37,137,233,0.12);
    }
    input.err { border-color: var(--danger); }

    .eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 14px; color: var(--muted); transition: color .18s;
    }
    .eye:hover { color: var(--blue); }

    /* ── BUTTON ── */
    .btn-login {
      width: 100%; padding: 13px;
      border-radius: 10px;
      background: var(--blue);
      color: #fff; font-family: inherit; font-size: 14.5px; font-weight: 700;
      border: none; cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 14px rgba(37,137,233,0.35);
      transition: background .18s, box-shadow .18s, transform .12s;
      position: relative; overflow: hidden;
    }
    .btn-login:hover {
      background: var(--blue-dark);
      box-shadow: 0 6px 20px rgba(37,137,233,0.45);
      transform: translateY(-1px);
    }
    .btn-login:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-login.loading .btxt::after {
      content:'';
      display:inline-block; width:10px; height:10px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius:50%;
      animation: spin .6s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── ERROR ── */
    .errmsg {
      display: none;
      background: #fef2f2; border: 1.5px solid #fecaca;
      color: #b91c1c; border-radius: 9px;
      padding: 10px 13px; font-size: 13px; font-weight: 600;
      margin-top: 12px;
    }
    .errmsg.show { display: block; }

    /* ── FOOTER ── */
    .footer-link { text-align:center; margin-top:22px; font-size:13px; color:var(--muted); }
    .footer-link a { color:var(--blue); text-decoration:none; font-weight:600; }
    .footer-link a:hover { color:var(--blue-dark); text-decoration:underline; }

    @media(max-width:480px) { .card { padding:28px 20px 26px; } }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="circle circle-1"></div>
<div class="circle circle-2"></div>
<div class="circle circle-3"></div>
<div class="circle circle-4"></div>

<div class="card">
  <div class="logo-row">
    <div class="logo-box">
      <img src="../assets/images/logologin.png" alt="Logo FMIPA UNTAN">
    </div>
    <div class="logo-txt">
      <div class="sup">Fakultas MIPA — Untan</div>
      <div class="main">Portal Informasi</div>
    </div>
  </div>

  <h1>Selamat Datang 👋</h1>
  <p class="sub">Masuk ke panel admin untuk mengelola konten portal.</p>

  <div class="fg">
    <label>Username</label>
    <div class="iw">
      <span class="iico">👤</span>
      <input type="text" id="username" placeholder="Masukkan username" autocomplete="username"/>
    </div>
  </div>

  <div class="fg">
    <label>Password</label>
    <div class="iw">
      <span class="iico">🔒</span>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
      <button type="button" class="eye" id="eyeBtn" onclick="toggleEye()">👁️</button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">
    <span class="btxt">🔑 Masuk ke Admin Panel</span>
  </button>

  <div class="errmsg" id="errMsg">
    <span id="errTxt">Username atau password salah.</span>
  </div>

  <div class="footer-link">
    <a href="../index.html">← Kembali ke Portal</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
  if (getSession()) window.location.replace('index.html');

  function toggleEye() {
    const pw  = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    btn.textContent = pw.type === 'text' ? '🙈' : '👁️';
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errMsg');

    err.classList.remove('show');
    document.getElementById('username').classList.remove('err');
    document.getElementById('password').classList.remove('err');

    if (!username || !password) {
      document.getElementById('errTxt').textContent = 'Username dan password wajib diisi.';
      err.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    const result = await serverLogin(username, password);

    if (result.ok) {
      const redirect = sessionStorage.getItem('portal_redirect');
      sessionStorage.removeItem('portal_redirect');
      window.location.replace(
        (redirect && redirect.includes('admin') && !redirect.includes('login'))
          ? redirect : 'index.html'
      );
    } else {
      document.getElementById('errTxt').textContent = result.error || 'Username atau password salah.';
      err.classList.add('show');
      document.getElementById('username').classList.add('err');
      document.getElementById('password').classList.add('err');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
